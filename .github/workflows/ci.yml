name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go / Huma 2.30.0
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: "1.25.x"
          cache: true

      - name: Validate Go toolchain
        run: go version

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

  latest-huma:
    name: Go / latest Huma v2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: "1.25.x"
          cache: true

      - name: Select latest Huma v2
        run: go get github.com/danielgtaylor/huma/v2@latest

      - name: Test
        run: go test ./...

  e2e-image:
    name: Consumer image build
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'release/prepare-v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Install just
        uses: extractions/setup-just@v4.0.0
      - name: Build consumer image
        run: just e2e-image observability-e2e-local:ci
