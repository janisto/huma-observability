name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.25.x"
          cache: true

      - name: Validate Go toolchain
        run: go version

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...
